syntax = "proto3";

package export;

option go_package = "github.com/Hubcher/project-management/contracts/gen/go/export;exportpb";

service ExportService {
  rpc Ping(Empty) returns (Empty) {}
  rpc BuildExport(BuildExportRequest) returns (BuildExportResponse) {}
}

message Empty {}

message BuildExportRequest {
  string report_type = 1;
  string format = 2;
  string project_id = 3;
  string date_from = 4;
  string date_to = 5;
  string group_by = 6;
  string payment_type = 7;
  string payment_status = 8;
  bool overdue_only = 9;
  string requester_user_id = 10;
  bool include_all_projects = 11;
}

message BuildExportResponse {
  string file_name = 1;
  string content_type = 2;
  bytes data = 3;
}
