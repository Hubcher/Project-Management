syntax = "proto3";

package auth;

import "google/protobuf/empty.proto";

option go_package =
    "github.com/Hubcher/project-management/contracts/gen/authpb";

service AuthService {
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);

  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc AdminRegister(AdminRegisterRequest) returns (AdminRegisterResponse);
  rpc AdminLogin(AdminLoginRequest) returns (LoginResponse);
  rpc Validate(ValidateRequest) returns (ValidateResponse);

  // пригодится для удаления пользователя через gateway orchestration
  rpc DeleteCredentials(DeleteCredentialsRequest)
      returns (DeleteCredentialsResponse);
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  string id = 1;
  int64 status = 2;
  string error = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  int64 status = 2;
  string error = 3;
}

message AdminRegisterRequest {
  string username = 1;
  string password = 2;
}

message AdminRegisterResponse {
  string id = 1;
  string username = 2;
  int64 status = 3;
  string error = 4;
}

message AdminLoginRequest {
  string username = 1;
  string password = 2;
}

message ValidateRequest {
  string token = 1;
}

message ValidateResponse {
  int64 status = 1;
  string error = 2;
  string userID = 3;
  string role = 4;
  string email = 5;
}

message DeleteCredentialsRequest {
  string userID = 1;
}

message DeleteCredentialsResponse {
  int64 status = 1;
  string error = 2;
}