syntax = "proto3";

package user;

import "google/protobuf/empty.proto";

option go_package = "github.com/Hubcher/project-management/contracts/gen/userpb";

service UserService {
  // ping
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty) {}

  //CRUD rpc
  rpc CreateUser(CreateUserRequest) returns (User) {}
  rpc GetUser(GetUserRequest) returns (User) {}
  rpc GetUserByEmail(GetUserByEmailRequest) returns (UserWithPassword) {}
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {}
  rpc UpdateUser(UpdateUserRequest) returns (User) {}
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {}
}

message User {
  string id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
  string created_at = 5;
}

message CreateUserRequest {
  string id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
  string role = 5;
}

message GetUserRequest {
  string id = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message UserWithPassword {
  string id = 1;
  string name = 2;
  string email = 3;
  string password = 4; // должен быть hash, не raw password
  string role = 5;
  string created_at = 6;
}

message ListUsersRequest {
  string role = 1;
}

message ListUsersResponse {
  repeated User users = 1;
}

message UpdateUserRequest {
  string id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
  string role = 5;
}

message DeleteUserRequest {
  string id = 1;
}
