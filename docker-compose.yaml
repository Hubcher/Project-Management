services:
  gateway:
    image: api:latest
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: api
    restart: unless-stopped
    ports:
      - "28080:8080"
    volumes:
      - ./gateway/configs:/app/configs:ro
    environment:
      ADDRESS: ":8080"
      AUTH_ADDRESS: "auth-service:8080"
      USER_ADDRESS: "user-service:8080"
      PROJECT_ADDRESS: "project-service:8080"
      REPORT_ADDRESS: "report-service:8080"
      PAYMENT_CALENDAR_ADDRESS: "payment-calendar-service:8080"
      EXPORT_ADDRESS: "export-service:8080"
      API_TIMEOUT: "5s"
    depends_on:
      - auth-service
      - user-service
      - project-service
      - report-service
      - payment-calendar-service
      - export-service

  auth-service:
    image: auth:latest
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "28081:8080"
    volumes:
      - ./auth-service/configs:/app/configs:ro
    environment:
      AUTH_ADDRESS: ":8080"
      DB_ADDRESS: "postgres://postgres:password@auth-postgres:5432/authdb?sslmode=disable"
      BOOTSTRAP_ADMIN_ENABLED: "true"
      BOOTSTRAP_ADMIN_EMAIL: "admin@example.com"
      BOOTSTRAP_ADMIN_PASSWORD: "Admin123!"
    depends_on:
      auth-postgres:
        condition: service_healthy

  project-service:
    image: project:latest
    build:
      context: .
      dockerfile: project-service/Dockerfile
    container_name: project-service
    restart: unless-stopped
    ports:
      - "28082:8080"
    volumes:
      - ./project-service/configs:/app/configs:ro
    environment:
      PROJECT_ADDRESS: ":8080"
      DB_ADDRESS: "postgres://postgres:password@project-postgres:5432/projectdb?sslmode=disable"
    depends_on:
      project-postgres:
        condition: service_healthy

  user-service:
    image: user:latest
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "28083:8080"
    volumes:
      - ./user-service/configs:/app/configs:ro
    environment:
      USER_ADDRESS: ":8080"
      DB_ADDRESS: "postgres://postgres:password@user-postgres:5432/userdb?sslmode=disable"
    depends_on:
      user-postgres:
        condition: service_healthy

  report-service:
    image: report:latest
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: report-service
    restart: unless-stopped
    ports:
      - "28084:8080"
    volumes:
      - ./report-service/configs:/app/configs:ro
    environment:
      REPORT_ADDRESS: ":8080"
      DB_ADDRESS: "postgres://postgres:password@report-postgres:5432/reportdb?sslmode=disable"
    depends_on:
      report-postgres:
        condition: service_healthy

  payment-calendar-service:
    image: payment-calendar:latest
    build:
      context: .
      dockerfile: payment-calendar-service/Dockerfile
    container_name: payment-calendar-service
    restart: unless-stopped
    ports:
      - "28085:8080"
    volumes:
      - ./payment-calendar-service/configs:/app/configs:ro
    environment:
      PAYMENT_CALENDAR_ADDRESS: ":8080"
      DB_ADDRESS: "postgres://postgres:password@payment-calendar-postgres:5432/paymentcalendardb?sslmode=disable"
      PROJECT_ADDRESS: "project-service:8080"
    depends_on:
      payment-calendar-postgres:
        condition: service_healthy
      project-service:
        condition: service_started

  export-service:
    image: export:latest
    build:
      context: .
      dockerfile: export-service/Dockerfile
    container_name: export-service
    restart: unless-stopped
    ports:
      - "28086:8080"
    volumes:
      - ./export-service/configs:/app/configs:ro
    environment:
      EXPORT_ADDRESS: ":8080"
      PROJECT_ADDRESS: "project-service:8080"
      PAYMENT_CALENDAR_ADDRESS: "payment-calendar-service:8080"
    depends_on:
      project-service:
        condition: service_started
      payment-calendar-service:
        condition: service_started

  project-postgres:
    image: postgres:16-alpine
    container_name: project-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projectdb
    volumes:
      - project-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projectdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  user-postgres:
    image: postgres:16-alpine
    container_name: user-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: userdb
    volumes:
      - user-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: authdb
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  report-postgres:
    image: postgres:16-alpine
    container_name: report-postgres
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reportdb
    volumes:
      - report-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reportdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  payment-calendar-postgres:
    image: postgres:16-alpine
    container_name: payment-calendar-postgres
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: paymentcalendardb
    volumes:
      - payment-calendar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paymentcalendardb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  tests:
    image: tests:latest
    build: tests
    container_name: tests
    restart: "no"
    profiles:
      - tests
    environment:
      API_BASE_URL: "http://gateway:8080"
    depends_on:
      - gateway

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    restart: unless-stopped
    ports:
      - "18888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_DISABLE_POSTFIX: "true"
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - user-postgres
      - auth-postgres
      - project-postgres
      - report-postgres
      - payment-calendar-postgres

volumes:
  project-postgres-data:
  user-postgres-data:
  auth-postgres-data:
  report-postgres-data:
  payment-calendar-postgres-data:
  pgadmin:
